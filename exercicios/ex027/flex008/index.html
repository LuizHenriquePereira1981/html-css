<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible Box</title>
    <style>
      div.conteiner {
        background-color: rgb(255, 140, 63);
        height: 400px;
        display: flex;
        align-items: flex-start;
        flex-flow: row wrap;
        gap: 10px;
      }
      div.item {
        background-color: #75a9da;
        color: white;
        padding: 20px;
        text-align: center;
      }

      div#i1 {
        align-self: auto;
      }
      div#i2 {
        align-self: stretch;
      }
      div#i3 {
       align-self: center;
      }
      div#i4 {
       align-self: flex-end;
      }
      div#i5 {
        align-self: center;
      }
      div#i6 {
        align-self: stretch;
      }
      div#i7 {
       align-self: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item" id="i1">A</div>
      <div class="item" id="i2">B</div>
      <div class="item" id="i3">C</div>
      <div class="item" id="i4">D</div>
      <div class="item" id="i5">E</div>
      <div class="item" id="i6">F</div>
      <div class="item" id="i7">G</div>
    </div>
  </body>
</html>
