<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner1, div.conteiner2, div.conteiner3 {
            background-color: lightsalmon;
            display: flex;
            flex-flow:row nowrap;
        }
        div.item {
            background-color: #75a9da;
            color: white;
            padding: 20px;
            margin: 0px 0px 10px 0px;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px; /* largura inicial de cada item */
        }
        div#cxA {
            flex-shrink: 1; /* encolhimento */
            flex-grow: 1; /* crescimento */
        }
         div#cxB {
            flex-shrink: 1;
            flex-grow: 1;
        }
         div#cxC {
            flex-shrink: 1;
            flex-grow: 1;
        }
        div#cxD {
            flex-shrink: 2;
            flex-grow: 1;
        }
        div#cxE {
            flex-shrink: 0;
            flex-grow: 4;
        }
        div#cxF {
            flex-shrink: 1;
            flex-grow: 2;
        }
        div#cxG {
            flex-shrink: 4;
            flex-grow: 1;
        }
        div#cxH {
            flex-shrink: 2;
            flex-grow: 4;
        }
        div#cxI {
            flex-shrink: 10;
            flex-grow: 0;
        }
    </style>
</head>
<body>
    <div class="conteiner1">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
    <div class="conteiner2">
        <div class="item" id="cxD">D</div>
        <div class="item" id="cxE">E</div>
        <div class="item" id="cxF">F</div>
    </div>
     <div class="conteiner3">
        <div class="item" id="cxG">G</div>
        <div class="item" id="cxH">H</div>
        <div class="item" id="cxI">I</div>
</body>
</html>
