<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: lightsalmon;
            display: flex;
            flex-flow:row nowrap;
        }
        div.item {
            background-color: #75a9da;
            color: white;
            padding: 20px;
            margin: 0px 0px 10px 0px;
            border: 1px solid black;
            text-align: center;
            /*flex-basis: 200px;  largura inicial de cada item */
            /* Valores possíveis para flex:
            flex: 0 1 auto; flex-grow, flex-shrink, flex-basis = flex: initial; 
            flex: 0 0 auto; flex-grow, flex-shrink, flex-basis = flex: none; 
            flex: 1 1 auto; flex-grow, flex-shrink, flex-basis = flex: auto;
            */
            
        }
        div#cxA {
            /*flex-shrink: 1; encolhimento */
            /*flex-grow: 1;  crescimento */
            flex: 0 1 auto; /* flex-grow, flex-shrink, flex-basis */
        }
         div#cxB {
            /*flex-shrink: 1;
            flex-grow: 1;*/
            flex: 0 0 auto; /* flex-grow, flex-shrink, flex-basis */
        }
         div#cxC {
            /*flex-shrink: 1;
            flex-grow: 1;*/
            flex: 1 1 auto; /* flex-grow, flex-shrink, flex-basis */
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
</body>
</html>
